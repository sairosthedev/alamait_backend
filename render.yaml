services:
  - type: web
    name: alamait-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      # Keep API responsive on a single Render web dyno
      - key: ENABLE_REPORT_PRECOMPUTE
        value: "false"
      - key: RUN_ACCRUAL_CHECK_ON_STARTUP
        value: "false"
      - key: MONGO_MAX_POOL_SIZE
        value: "15"
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /api-docs/*
        destination: /api-docs
      - type: rewrite
        source: /*
        destination: /
